<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Performance Visualization</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        .chart {
            width: 600px;
            height: 400px;
            margin: 50px auto;
        }
        .model-info {
            margin: 20px;
            font-size: 14px;
        }
        .model-title {
            font-size: 18px;
            font-weight: bold;
        }
        .model-details {
            margin-top: 10px;
        }
        .model-details p {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <h1>Model Performance Comparison</h1>
    
    <!-- Area to show the charts -->
    <div id="performanceChart" class="chart"></div>
    <div id="modelDetails" class="model-info"></div>

    <script>
        // Sample data (you would replace this with actual data from your XML)
        const models = [
            {name: "Cubic", modelType: "Cubic", targetVariable: "Adada", independentVariables: "(Ajali, Imo)", r2: 0.978, nse: 0.90, rmse: 0.10, formula: "formula_expression_1"},
            {name: "Cubic", modelType: "Cubic", targetVariable: "Adada", independentVariables: "(Ajali, Imo)", r2: 0.92, nse: 0.89, rmse: 0.15, formula: "formula_expression_2"},
            {name: "Random Forest", modelType: "Random Forest", targetVariable: "Adada", independentVariables: "(Ajali, Imo, Otamiri)", r2: 0.87, nse: 0.84, rmse: 0.25, formula: "formula_expression_3"},
            {name: "Random Forest", modelType: "Random Forest", targetVariable: "Adada", independentVariables: "(Ajali, Ivo)", r2: 0.80, nse: 0.77, rmse: 0.35, formula: "formula_expression_4"},
            {name: "Quadratic", modelType: "Quadratic", targetVariable: "Adada", independentVariables: "(Imo, Otamiri)", r2: 0.91, nse: 0.88, rmse: 0.18, formula: "formula_expression_5"},
            // Add more models as needed...
        ];

        // Function to create bar charts
        function createBarChart(data, chartId, title) {
            const margin = { top: 20, right: 30, bottom: 40, left: 40 };
            const width = 600 - margin.left - margin.right;
            const height = 400 - margin.top - margin.bottom;

            const x = d3.scaleBand().domain(data.map(d => d.name + " " + d.modelType)).range([0, width]).padding(0.1);
            const y = d3.scaleLinear().domain([0, d3.max(data, d => d.r2)]).nice().range([height, 0]);

            const colorScale = d3.scaleOrdinal()
                .domain(["Cubic", "Random Forest", "Quadratic"])
                .range(["red", "blue", "green"]); // Different colors for different model types

            const svg = d3.select(chartId)
                .append('svg')
                .attr('width', width + margin.left + margin.right)
                .attr('height', height + margin.top + margin.bottom)
                .append('g')
                .attr('transform', `translate(${margin.left},${margin.top})`);

            svg.append('text')
                .attr('x', width / 2)
                .attr('y', -10)
                .attr('text-anchor', 'middle')
                .style('font-size', '16px')
                .text(title);

            svg.selectAll('.bar')
                .data(data)
                .enter()
                .append('rect')
                .attr('class', 'bar')
                .attr('x', d => x(d.name + " " + d.modelType))
                .attr('y', d => y(d.r2))
                .attr('width', x.bandwidth())
                .attr('height', d => height - y(d.r2))
                .style('fill', d => colorScale(d.modelType));

            svg.append('g')
                .attr('class', 'x-axis')
                .attr('transform', `translate(0,${height})`)
                .call(d3.axisBottom(x).tickSize(0));

            svg.append('g')
                .attr('class', 'y-axis')
                .call(d3.axisLeft(y));
        }

        // Update model details section
        function showModelDetails(model) {
            const detailsSection = d3.select('#modelDetails');
            detailsSection.html(`
                <div class="model-title">${model.name} - ${model.modelType} Model</div>
                <div><strong>Target Variable:</strong> ${model.targetVariable}</div>
                <div><strong>Independent Variables:</strong> ${model.independentVariables}</div>
                <div><strong>Formula:</strong> ${model.formula}</div>
                <div><strong>R²:</strong> ${model.r2}</div>
                <div><strong>NSE:</strong> ${model.nse}</div>
                <div><strong>RMSE:</strong> ${model.rmse}</div>
            `);
        }

        // Create the chart with top 20 models (use slice to limit to top 20)
        createBarChart(models.slice(0, 20), '#performanceChart', 'Model Performance (Top 20)');

        // Display details for the first model as an example
        showModelDetails(models[0]);
    </script>
</body>
</html>
