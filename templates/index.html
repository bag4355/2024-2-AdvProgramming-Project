<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Performance Visualization</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        .chart {
            width: 800px;
            height: 400px;
            margin: 50px auto;
        }
        .model-info {
            margin: 20px;
            font-size: 14px;
        }
        .model-title {
            font-size: 18px;
            font-weight: bold;
        }
        .model-details {
            margin-top: 10px;
        }
        .model-details p {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <h1>Top 20 Model Performance Comparison</h1>
    
    <!-- Area to show the charts -->
    <div id="performanceChart" class="chart"></div>
    <div id="modelDetails" class="model-info"></div>

    <script>
        // Flask에서 전달된 models 데이터를 사용
        const models = {{ models | tojson }};

        // Sort models based on R², CPI, NSE, RMSE
        models.sort((a, b) => {
            if (b.r2 !== a.r2) return b.r2 - a.r2; // Sort by R² (highest first)
            if (a.cpi !== b.cpi) return a.cpi - b.cpi; // Sort by CPI (lowest first)
            if (b.nse !== a.nse) return b.nse - a.nse; // Sort by NSE (highest first)
            return a.rmse - b.rmse; // Sort by RMSE (lowest first)
        });

        // Function to create bar charts for each metric
        function createBarChart(data, chartId, title, metric) {
            const margin = { top: 20, right: 30, bottom: 40, left: 40 };
            const width = 800 - margin.left - margin.right;
            const height = 400 - margin.top - margin.bottom;

            const x = d3.scaleBand().domain(data.map(d => `${d.name} ${d.modelType}`)).range([0, width]).padding(0.1);
            const y = d3.scaleLinear().domain([0, d3.max(data, d => d[metric])]).nice().range([height, 0]);

            const colorScale = d3.scaleOrdinal()
                .domain(["Cubic", "Random Forest", "Quadratic"])
                .range(["red", "blue", "green"]);

            const svg = d3.select(chartId)
                .append('svg')
                .attr('width', width + margin.left + margin.right)
                .attr('height', height + margin.top + margin.bottom)
                .append('g')
                .attr('transform', `translate(${margin.left},${margin.top})`);

            svg.append('text')
                .attr('x', width / 2)
                .attr('y', -10)
                .attr('text-anchor', 'middle')
                .style('font-size', '16px')
                .text(title);

            svg.selectAll('.bar')
                .data(data)
                .enter()
                .append('rect')
                .attr('class', 'bar')
                .attr('x', d => x(`${d.name} ${d.modelType}`))
                .attr('y', d => y(d[metric]))
                .attr('width', x.bandwidth())
                .attr('height', d => height - y(d[metric]))
                .style('fill', d => colorScale(d.modelType));

            svg.append('g')
                .attr('class', 'x-axis')
                .attr('transform', `translate(0,${height})`)
                .call(d3.axisBottom(x).tickSize(0));

            svg.append('g')
                .attr('class', 'y-axis')
                .call(d3.axisLeft(y));
        }

        // Update model details section
        function showModelDetails(model) {
            const detailsSection = d3.select('#modelDetails');
            detailsSection.html(`
                <div class="model-title">${model.name} - ${model.modelType} Model</div>
                <div><strong>Target Variable:</strong> ${model.targetVariable}</div>
                <div><strong>Independent Variables:</strong> ${model.independentVariables}</div>
                <div><strong>Formula:</strong> ${model.formula}</div>
                <div><strong>R²:</strong> ${model.r2}</div>
                <div><strong>NSE:</strong> ${model.nse}</div>
                <div><strong>RMSE:</strong> ${model.rmse}</div>
                <div><strong>CPI:</strong> ${model.cpi}</div>
            `);
        }

        // Create the charts for each metric (Top 20 models for each metric)
        createBarChart(models.slice(0, 20), '#performanceChart', 'Top 20 Models Sorted by R², CPI, NSE, and RMSE', 'r2');
        createBarChart(models.slice(0, 20), '#performanceChart', 'Top 20 Models Sorted by R², CPI, NSE, and RMSE', 'cpi');
        createBarChart(models.slice(0, 20), '#performanceChart', 'Top 20 Models Sorted by R², CPI, NSE, and RMSE', 'nse');
        createBarChart(models.slice(0, 20), '#performanceChart', 'Top 20 Models Sorted by R², CPI, NSE, and RMSE', 'rmse');

        // Display details for the first model as an example
        showModelDetails(models[0]);
    </script>
</body>
</html>
